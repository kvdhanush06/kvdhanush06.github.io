<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative terminal prompt -->
  <text x="80" y="100" font-family="'Courier New', monospace" font-size="28" fill="#333333">&gt;</text>

  <!-- Main title -->
  <text x="80" y="240" font-family="'Courier New', monospace" font-size="72" font-weight="700" fill="#ffffff">
    Venkata Dhanush
  </text>
  <text x="80" y="320" font-family="'Courier New', monospace" font-size="52" font-weight="400" fill="#888888">
    Kakarlamudi
  </text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="'Courier New', monospace" font-size="28" fill="#666666">
    Backend Systems &amp; AI/LLM Engineer
  </text>

  <!-- Terminal cursor blink -->
  <text x="80" y="480" font-family="'Courier New', monospace" font-size="22" fill="#444444">
    portfolio.allkvd.dev
  </text>

  <!-- Divider line -->
  <line x1="80" y1="520" x2="500" y2="520" stroke="#222222" stroke-width="2"/>
</svg>
